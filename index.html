<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>OPIC IL Script Trainer</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="app-shell">
      <aside class="sidebar" aria-label="주요 메뉴">
        <div class="brand">
          <span class="brand-mark">IL</span>
          <div>
            <h1>OPIC Trainer</h1>
            <p>유형별 스크립트 암기</p>
          </div>
        </div>

        <nav class="nav-list" aria-label="대시보드 섹션">
          <a href="#scripts" class="nav-link active">맞춤 스크립트</a>
          <a href="#practice" class="nav-link">60초 연습</a>
        </nav>

        <div class="sidebar-note">
          <span>프로젝트 목표</span>
          <strong>질문은 다양하게, 답변은 익숙한 표현으로</strong>
        </div>
      </aside>

      <main class="main">
        <section id="scripts" class="section-band">
          <div class="section-title">
            <div>
              <p class="eyebrow">Script Library</p>
              <h2>OPIC 유형별 맞춤 스크립트</h2>
            </div>
            <div class="segmented" id="typeTabs" role="tablist" aria-label="OPIC 유형"></div>
          </div>
          <div class="script-board single" id="scriptBoard"></div>
        </section>

        <section id="practice" class="section-band">
          <div class="topbar">
            <div>
              <p class="eyebrow">Random 60 Seconds</p>
              <h2>질문만 보고 60초 동안 말하기</h2>
            </div>
            <button class="primary-button large-button" id="practiceButton" type="button">60초 연습</button>
          </div>

          <article class="practice-stage">
            <div class="stage-status">
              <span id="practiceState">대기</span>
              <strong id="timer">00:00</strong>
            </div>
            <p class="question" id="practiceQuestion">60초 연습 버튼을 누르면 실제 OPIC 유형과 질문이 랜덤으로 나옵니다.</p>
            <p class="muted" id="practiceGuide">연습 중에는 질문만 보입니다. 종료하거나 60초가 지나면 유형, 해석, 좋은 답변 예시가 열립니다.</p>
          </article>

          <section class="result-panel hidden" id="practiceResult" aria-live="polite">
            <div class="result-grid">
              <article class="panel">
                <p class="eyebrow">Question Type</p>
                <h3 id="resultType"></h3>
                <p id="resultQuestionKo" class="translation"></p>
              </article>

              <article class="panel answer-panel">
                <p class="eyebrow">Good Answer</p>
                <h3>좋은 답변 예시</h3>
                <div class="script-lines" id="resultAnswer"></div>
              </article>
            </div>
          </section>
        </section>
      </main>
    </div>

    <script src="./app.js"></script>
  </body>
</html>
